services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mixmo
      POSTGRES_USER: mixmo
      POSTGRES_PASSWORD: mixmo
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mixmo -d mixmo"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mixmo
      SPRING_DATASOURCE_USERNAME: mixmo
      SPRING_DATASOURCE_PASSWORD: mixmo
      MIXMO_VALIDATOR_BASE_URL: http://python-api:8000
      MIXMO_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174, http://localhost:4173, http://frontend:4173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      python-api:
        condition: service_started

  python-api:
    build:
      context: ./python_api
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_WS_BASE_URL: ws://localhost:8080/ws
      VITE_DEBUG_DEMO_ROOM: true
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  postgres-data:
