spring:
  datasource:
    url: jdbc:h2:mem:mixmo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false
  task:
    scheduling:
      enabled: false

mixmo:
  cors:
    allowed-origins: http://localhost:5173
  validator:
    base-url: http://localhost:8000
